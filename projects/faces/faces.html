	<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --faces-bg: #331304;
            --faces-dark: #0a0a0a;
            --faces-light: #f5f5f5;
            --faces-accent: #E8B77D;

            /* Mini Nav Color Overrides */
            --mininav-bg: transparent;
            --mininav-logo-fill: transparent;
            --mininav-logo-opacity: 0;
            --mininav-logo-opacity-active: 0;
            --mininav-backdrop-display: block;
        }

        /* Override backdrop mask and styling for this page */
        .minimal-nav .backdrop-blur {
            mask: url(#logo-cut-faces);
            -webkit-mask: url(#logo-cut-faces);
            background: rgba(70, 35, 15, 0.95);
            transition: background 0.6s ease;
        }

        body.joni-hover .minimal-nav .backdrop-blur {
            background: rgba(70, 20, 35, 0.95);
        }

        .nav-rect {
            fill: transparent;
        }

		body {
			font-family: "Roboto Flex", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
			background: var(--faces-bg);
			color: var(--faces-light);
			line-height: 1.6;
			overflow: hidden;
			margin: 0;
			padding: 0;
			height: 100vh;
			transition: background-color 0.6s ease;
		}

		body.joni-hover { background: #2D000D; }

        /* Gallery Container */
        .gallery {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2vw;
            padding: 60px 40px 40px;
            position: relative;
        }

		/* Series label */
		.series-label {
			position: fixed;
			top: var(--mininav-spacing);
			right: var(--mininav-spacing);
			font-size: 12px;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 2px;
			color: var(--faces-accent);
			padding: 12px 20px;
			background: rgba(0, 0, 0, 0.5);
			backdrop-filter: blur(10px);
			border-radius: 10px;
			transition: color 0.6s ease;
		}

		body.joni-hover .series-label { color: #D1005D; }

        /* Individual artwork piece */
        .piece {
            position: relative;
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .piece .artwork-image {
            max-width: 100%;
            max-height: calc(100vh - 120px);
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            transition: filter 0.4s ease;
        }

        /* Info overlay */
        .piece-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20px 20px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.4) 60%, transparent 100%);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.35s ease, transform 0.35s ease;
            pointer-events: none;
        }

        .piece:hover .piece-info {
            opacity: 1;
            transform: translateY(0);
        }

        .piece-title {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--faces-light);
            margin: 0;
            line-height: 1;
        }

        .piece-series {
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 6px;
        }

        .piece[data-slug="amari"] .piece-series { color: #E8B77D; }
        .piece[data-slug="joni"] .piece-series { color: #D1005D; }

        .piece-series .series-word {
            opacity: 0.5;
        }

        .piece-meta {
            display: flex;
            gap: 16px;
            margin-top: 10px;
        }

        .piece-date,
        .piece-medium {
            font-size: 12px;
            font-weight: 400;
            color: var(--faces-light);
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery {
                flex-direction: column;
                gap: 3vh;
                padding: 60px 20px 20px;
            }

            .piece {
                flex: none;
                width: 100%;
                height: auto;
                max-height: 45vh;
            }

            .piece .artwork-image {
                max-height: 40vh;
                max-width: 90vw;
            }

			.piece-info {
				opacity: 1;
				transform: translateY(0);
				padding: 16px 12px 10px;
			}

            .piece-title {
                font-size: 24px;
            }

            .piece-meta {
                flex-direction: column;
                gap: 2px;
            }

			.series-label {
				font-size: 10px;
				padding: 10px 16px;
			}
        }

        @media (max-width: 480px) {
            .piece-title {
                font-size: 20px;
            }

			.piece .artwork-image {
				max-width: 95vw;
			}
        }
	</style>

	<script>
		// Background color shift on hover
		document.querySelectorAll('.piece').forEach(piece => {
			piece.addEventListener('mouseenter', () => {
				document.body.className = piece.dataset.slug === 'joni' ? 'joni-hover' : '';
			});
			piece.addEventListener('mouseleave', () => {
				document.body.className = '';
			});
		});

		// Disable right-click on images
		document.addEventListener('contextmenu', function(e) {
			if (e.target.tagName === 'IMG') {
				e.preventDefault();
			}
		});
